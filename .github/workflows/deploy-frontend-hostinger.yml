name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Write hosted API runtime config
        shell: bash
        run: |
          cat <<'EOF' > frontend/dist/config.js
          window.__LICITAAI_CONFIG__ = {
            apiBaseUrl: "https://licitaja-production.up.railway.app/api",
          };
          EOF

      - name: Prepare Hostinger deploy package
        shell: bash
        run: |
          rm -rf hostinger-deploy
          mkdir -p hostinger-deploy
          cp .htaccess hostinger-deploy/.htaccess
          cp frontend/dist/config.js hostinger-deploy/config.js
          cp frontend/dist/index.html hostinger-deploy/index.html
          cp -R frontend/dist/assets hostinger-deploy/assets

      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_SERVER }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          protocol: ${{ secrets.HOSTINGER_PROTOCOL }}
          server-dir: ${{ secrets.HOSTINGER_SERVER_DIR }}
          local-dir: hostinger-deploy/
